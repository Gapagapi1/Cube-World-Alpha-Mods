name: Build and release

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MSYS2 (MINGW32)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW32
          update: true
          install: >-
            mingw-w64-i686-gcc

      - name: Build DLLs
        shell: msys2 {0}
        run: |
          i686-w64-mingw32-gcc -shared -O2 -s -static-libgcc -o Config.dll cw-config.c -lws2_32
          i686-w64-mingw32-gcc -shared -O2 -s -o GracefulShutdown.dll cw-graceful-shutdown.c

      - name: Prepare release files
        shell: msys2 {0}
        run: |
          mkdir -p dist
          cp Config.dll dist/
          cp GracefulShutdown.dll dist/
          cp README.md dist/

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: cube-world-alpha-server-mods
          path: dist/

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: cube-world-alpha-server-mods
          path: dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/Config.dll \
            dist/GracefulShutdown.dll \
            dist/README.md \
            --repo "${{ github.repository }}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
